<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Scraper Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-card {
            transition: all 0.3s ease;
        }
        .stats-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Auto-Scraper Dashboard</span>
            <span class="navbar-text" id="lastUpdate"></span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stats-card bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title">URLs Discovered</h5>
                        <h2 class="card-text" id="urlsDiscovered">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">URLs Processed</h5>
                        <h2 class="card-text" id="urlsProcessed">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card bg-info text-white">
                    <div class="card-body">
                        <h5 class="card-title">Success Rate</h5>
                        <h2 class="card-text" id="successRate">0%</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card bg-warning text-white">
                    <div class="card-body">
                        <h5 class="card-title">Running Time</h5>
                        <h2 class="card-text" id="runningTime">0m</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">URL Categories Distribution</h5>
                        <div class="chart-container">
                            <canvas id="categoriesChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Processing Success/Failure</h5>
                        <div class="chart-container">
                            <canvas id="successChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Recent Activity</h5>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Time</th>
                                        <th>Event</th>
                                        <th>URL</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="activityLog">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const categoriesChart = new Chart(
            document.getElementById('categoriesChart'),
            {
                type: 'pie',
                data: {
                    labels: ['College', 'Exam', 'Scholarship', 'Career', 'Resources', 'Uncategorized'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0, 0],
                        backgroundColor: [
                            '#ff6384',
                            '#36a2eb',
                            '#ffce56',
                            '#4bc0c0',
                            '#9966ff',
                            '#c9cbcf'
                        ]
                    }]
                }
            }
        );

        const successChart = new Chart(
            document.getElementById('successChart'),
            {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Failure'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#28a745', '#dc3545']
                    }]
                }
            }
        );

        socket.on('stats', (data) => {
            document.getElementById('urlsDiscovered').textContent = data.urlsDiscovered;
            document.getElementById('urlsProcessed').textContent = data.urlsProcessed;
            document.getElementById('successRate').textContent = data.successRate;
            document.getElementById('runningTime').textContent = data.runningTime;
            document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

            categoriesChart.data.datasets[0].data = Object.values(data.categoryDistribution);
            categoriesChart.update();

            successChart.data.datasets[0].data = [data.successCount, data.failureCount];
            successChart.update();
        });

        socket.on('activity', (data) => {
            const tbody = document.getElementById('activityLog');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${new Date(data.time).toLocaleTimeString()}</td>
                <td>${data.event}</td>
                <td>${data.url}</td>
                <td><span class="badge bg-${data.status === 'success' ? 'success' : 'danger'}">${data.status}</span></td>
            `;
            tbody.insertBefore(row, tbody.firstChild);
            if (tbody.children.length > 100) {
                tbody.removeChild(tbody.lastChild);
            }
        });
    </script>
</body>
</html>
